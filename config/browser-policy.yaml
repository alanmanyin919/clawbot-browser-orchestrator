# Browser Routing Policy
# Defines which backend is preferred for each tool family

# CDP Configuration - shared across all browser backends
cdp:
  enabled: true
  url: "http://127.0.0.1:9222"
  # Set to false to let each tool launch its own browser (legacy mode)
  use_external_browser: true

# Primary backend configuration
primary:
  name: "better-browser-use"
  provider: "minimax"
  model: "MiniMax-M2.5"
  base_url: "https://api.minimax.io/v1"
  api_key: ""
  max_steps: 12
  timeout_seconds: 90
  max_retries: 2
  # CDP settings inherited from global cdp config
  use_external_browser: true
  cdp_url: "http://127.0.0.1:9222"

# Secondary backend configuration
fallback:
  name: "playwright-mcp"
  command: "npx"
  args:
    - "@playwright/mcp@latest"
  headless: true
  timeout_seconds: 45
  max_retries: 1
  # CDP settings
  use_external_browser: true
  cdp_url: "http://127.0.0.1:9222"

# Fallback triggers - when to use fallback
fallback_triggers:
  - type: "extraction_failed"
    description: "Primary extraction failed twice"
  - type: "navigation_stuck"
    description: "Primary navigation got stuck"
  - type: "dynamic_content"
    description: "Page content too dynamic for stable extraction"
  - type: "multi_step_workflow"
    description: "Task requires multi-step browsing workflow"

# Stop conditions - when to abort and report
stop_conditions:
  - type: "captcha"
    action: "blocked"
    message: "CAPTCHA challenge detected"
  - type: "login_required"
    action: "blocked"
    message: "Login required to access this content"
  - type: "human_verification"
    action: "blocked"
    message: "Human verification required"
  - type: "access_denied"
    action: "restricted"
    message: "Access denied to this resource"
  - type: "forbidden_content"
    action: "restricted"
    message: "Content access is forbidden"

# Output normalization
output:
  schema_version: "1.0"
  include_metadata: true
  include_visited_urls: true
